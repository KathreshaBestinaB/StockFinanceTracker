<nav *ngIf="showNavbar" class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" routerLink="/dashboard">
    Finance Tracker
  </a>

  <div class="ms-auto d-flex gap-2 flex-wrap">
    <a class="btn btn-outline-light" routerLink="/dashboard">
      Dashboard
    </a>

    <a class="btn btn-outline-light" routerLink="/stock">
      Stocks
    </a>

    <a class="btn btn-outline-light" routerLink="/portfolio">
      Portfolio
    </a>

    <a class="btn btn-outline-light" routerLink="/watchlist">
      Watchlist
    </a>

    <button
      class="btn btn-danger"
      (click)="logout()">
      Logout
    </button>
  </div>
</nav>

<div *ngIf="showTicker" class="ticker-container">
  <div class="ticker">
    <span *ngFor="let stock of tickerData">
      <b>{{ stock.symbol }}</b>
      {{ stock.price | number:'1.2-2' }}
      <span [ngClass]="{
        'text-success': stock.change > 0,
        'text-danger': stock.change < 0
      }">
        {{ stock.change > 0 ? '+' : '' }}{{ stock.change }}
      </span>
    </span>
  </div>
</div>
