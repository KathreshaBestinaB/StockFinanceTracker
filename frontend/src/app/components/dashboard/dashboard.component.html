<div class="container mt-5">

  <div class="card p-5 text-center">

    <h2 class="mb-3">Welcome to Finance Tracker</h2>

    <p class="text-muted mb-4">
      Track stocks, analyze performance, and manage your investments easily.
    </p>

    <div class="d-flex justify-content-center gap-3 flex-wrap">

      <a routerLink="/stock" class="btn btn-primary px-4 py-2">
        🔍 Search Stocks
      </a>

      <a routerLink="/portfolio" class="btn btn-success px-4 py-2">
        📊 View Portfolio
      </a>

      <button
        class="btn btn-danger px-4 py-2"
        (click)="logout()">
        🚪 Logout
      </button>

    </div>

  </div>

</div>
