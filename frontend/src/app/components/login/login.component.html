<div class="container mt-5" style="max-width:400px">

  <h2 class="text-center mb-4">Finance Tracker Login</h2>

  <div class="card p-4">

    <div class="mb-3">
      <label>Email</label>
      <input
        type="email"
        class="form-control"
        [(ngModel)]="email"
      />
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input
        type="password"
        class="form-control"
        [(ngModel)]="password"
      />
    </div>

    <button
      class="btn btn-primary w-100"
      (click)="login()"
    >
      Login
    </button>

    <p class="mt-3 text-center">
      Don't have an account?
      <a routerLink="/register">Register</a>
    </p>

  </div>

</div>
