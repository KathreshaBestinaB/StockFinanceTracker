<div class="news-section mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h3 class="mb-0">Latest Market News</h3>
    <span class="badge bg-dark">{{ articles.length }} Articles</span>
  </div>

  <div *ngIf="loading" class="text-center py-4">
    Loading market news...
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && articles.length === 0" class="alert alert-secondary">
    No market news available.
  </div>

  <div class="row" *ngIf="displayedArticles.length > 0">
    <div class="col-md-6 col-lg-3 mb-4" *ngFor="let article of displayedArticles">
      <div class="card h-100 shadow-sm border-0 news-card">
        <img
          *ngIf="article.image_url"
          [src]="article.image_url"
          class="card-img-top"
          alt="news image"
        />

        <div class="card-body d-flex flex-column">
          <p class="text-muted small mb-2">
            {{ article.source }} • {{ article.published_at | date:'mediumDate' }}
          </p>

          <h5 class="card-title">{{ article.title }}</h5>

          <p class="card-text">
            {{ article.description || 'No summary available.' }}
          </p>

          <span *ngIf="article.sentiment" class="badge bg-light text-dark border mb-3 align-self-start">
            {{ article.sentiment }}
          </span>

          <a
            [href]="article.url"
            target="_blank"
            class="btn btn-outline-primary mt-auto"
          >
            Read More
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-3" *ngIf="articles.length > 4">
    <button
      *ngIf="hasMore"
      class="btn btn-primary px-4 me-2"
      (click)="loadMore()"
    >
      Load More
    </button>

    <button
      *ngIf="!hasMore"
      class="btn btn-outline-secondary px-4"
      (click)="showLess()"
    >
      Show Less
    </button>
  </div>
</div>
