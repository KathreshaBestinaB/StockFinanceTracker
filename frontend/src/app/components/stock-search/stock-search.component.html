<div class="container mt-5">

  <h2 class="mb-4">Stock Search</h2>

  <div class="card p-4 position-relative">

    <div class="row g-3 align-items-start">
      <div class="col-lg-8 position-relative">

        <input
          type="text"
          class="form-control"
          placeholder="Enter Stock Symbol (AAPL)"
          [(ngModel)]="symbol"
          (input)="fetchSuggestions()"
          autocomplete="off"
        />

        <div *ngIf="suggestions.length > 0" class="list-group mt-2 shadow-sm">
          <button
            type="button"
            class="list-group-item list-group-item-action"
            *ngFor="let item of suggestions"
            (click)="selectSuggestion(item)"
          >
            <div class="d-flex justify-content-between align-items-center">
              <span><b>{{ item.symbol }}</b> - {{ item.instrument_name }}</span>
              <small class="text-muted">{{ item.exchange }}</small>
            </div>
          </button>
        </div>

      </div>

      <div class="col-lg-4">
        <button
          class="btn btn-primary w-100"
          (click)="searchStock()">
          Search Stock
        </button>
      </div>
    </div>

  </div>

  <div *ngIf="stock" class="card p-4 mt-4">

    <div class="row g-4 align-items-start">

      <div class="col-lg-8">
        <h3 class="mb-3">{{ stock.name }} ({{ stock.symbol }})</h3>

        <p class="mb-2"><b>Exchange:</b> {{ stock.exchange }}</p>

        <p class="mb-2"><b>Current Price:</b> {{ stock.price }} USD</p>

        <p class="mb-2">
          <b>Change:</b>
          <span
            [ngClass]="{
              'text-success': stock.change > 0,
              'text-danger': stock.change < 0
            }">
            {{ stock.change }} ({{ stock.percent_change }}%)
          </span>
        </p>

        <p class="mb-0">
          <b>Market Status:</b>
          <span
            [ngClass]="{
              'text-success': stock.market_open,
              'text-danger': !stock.market_open
            }">
            {{ stock.market_open ? 'Open' : 'Closed' }}
          </span>
        </p>
      </div>

      <div class="col-lg-4">
        <div class="card bg-light p-3">
          <label class="form-label fw-semibold">Quantity</label>

          <input
            type="number"
            class="form-control"
            [(ngModel)]="quantity"
            placeholder="Quantity"
            min="1"
          />

          <button class="btn btn-success mt-3 w-100" (click)="addToPortfolio()">
            Add to Portfolio
          </button>

          <button class="btn btn-warning mt-2 w-100" (click)="addToWatchlist()">
            Add to Watchlist
          </button>
        </div>
      </div>

    </div>

  </div>

  <div *ngIf="stock" class="card p-4 mt-4">
    <h4 class="mb-3">7-Day Price Chart</h4>

    <div style="height: 400px;">
      <canvas id="stockChart"></canvas>
    </div>
  </div>

  <div *ngIf="stock" class="card p-4 mt-4">
    <app-stock-news [symbol]="stock.symbol"></app-stock-news>
  </div>

</div>
