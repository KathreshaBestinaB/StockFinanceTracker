<div class="mt-5">
  <h3 class="mb-3">🔥 Trending Stocks</h3>

  <div *ngIf="loading">Loading...</div>

  <div class="row justify-content-center">
    <div class="col-md-4 col-lg-2 mb-3" *ngFor="let stock of stocks">
      <div class="card p-3 text-center shadow-sm trend-card">

        <h5>{{ stock.symbol }}</h5>

<p class="mb-1 fw-semibold">${{ stock.price }}</p>

<span
  [ngClass]="{
    'text-success': stock.change > 0,
    'text-danger': stock.change < 0
  }"
>
  {{ stock.change > 0 ? '▲' : '▼' }} {{ stock.change }}%
</span>

      </div>
    </div>
  </div>
</div>
